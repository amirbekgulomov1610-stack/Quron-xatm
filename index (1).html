<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qur'on Xatm — Guruh Nazorati</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, sans-serif; }
  .font-serif { font-family: Georgia, 'Times New Roman', serif; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: #44403c; border-radius: 4px; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-b from-emerald-950 via-stone-950 to-stone-950 text-stone-100">
<div id="app" class="px-3 sm:px-6 py-6"></div>

<script>
/* ====================== SOZLAMALAR ====================== */
const STORE_BASE = "https://jsonblob.com/api/jsonBlob"; // bepul, ro'yxatdan o'tishsiz umumiy xotira xizmati
const POLL_MS = 6000;

/* ====================== YORDAMCHI FUNKSIYALAR ====================== */
function qs(name){ return new URLSearchParams(location.search).get(name); }
function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("uz-UZ",{day:"2-digit",month:"2-digit"}) + " " + d.toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"});
}
function buildSchedule(totalPages, chunkSize, members){
  const chunks = []; let page = 1; let idx = 0;
  const n = members.length;
  if(n===0 || chunkSize<=0 || totalPages<=0) return chunks;
  while(page <= totalPages){
    const start = page;
    const end = Math.min(page + chunkSize - 1, totalPages);
    const memberIndex = idx % n;
    const day = Math.floor(idx / n) + 1;
    chunks.push({ id:String(idx), day, memberIndex, memberName: members[memberIndex], start, end });
    page = end + 1; idx++;
  }
  return chunks;
}

/* ====================== JSONBLOB.COM XOTIRA QATLAMI ====================== */
async function createRoom(initialState){
  const res = await fetch(STORE_BASE, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(initialState)
  });
  if(!res.ok) throw new Error("Xona yaratilmadi");
  const location = res.headers.get("Location") || "";
  const id = location.split("/").pop();
  if(!id) throw new Error("Xona ID topilmadi");
  return id;
}
async function readState(room){
  const res = await fetch(`${STORE_BASE}/${room}?t=${Date.now()}`, {
    headers: { "Accept": "application/json" }
  });
  if(res.status === 404) return null;
  if(!res.ok) throw new Error("O'qishda xatolik");
  return await res.json();
}
async function writeState(room, state){
  const res = await fetch(`${STORE_BASE}/${room}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state)
  });
  if(!res.ok) throw new Error("Saqlashda xatolik");
}

/* ====================== HOLAT ====================== */
let ROOM = qs("room") || "";
let STATE = null;
let CURRENT_USER = localStorage.getItem("khatm-my-name") || "";
let IS_ADMIN = false;
let pollTimer = null;
let notice = "";
let errorMsg = "";

const app = document.getElementById("app");

/* ====================== RENDER ROUTER ====================== */
async function boot(){
  if(!ROOM){
    renderCreateScreen();
    return;
  }
  renderLoading();
  try{
    STATE = await readState(ROOM);
  }catch(e){
    errorMsg = "Ma'lumotni yuklab bo'lmadi. Internetni tekshiring.";
  }
  if(!STATE){
    renderRoomNotFound();
    return;
  }
  if(!CURRENT_USER){
    renderChooseUser();
  } else {
    renderMain();
    startPolling();
  }
}

function startPolling(){
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try{
      const fresh = await readState(ROOM);
      if(fresh) { STATE = fresh; if(document.getElementById("app").dataset.view === "main") renderMain(true); }
    }catch(e){ /* jim, keyingi urinishda qayta */ }
  }, POLL_MS);
}

/* ====================== EKRAN: YANGI GURUH YARATISH ====================== */
function renderCreateScreen(){
  app.dataset.view = "create";
  app.innerHTML = `
  <div class="max-w-xl mx-auto py-6">
    <div class="text-center mb-8">
      <p class="text-amber-400 text-2xl mb-2">۞</p>
      <h1 class="font-serif text-3xl text-stone-50">Qur'on Xatm</h1>
      <p class="text-stone-400 mt-1">Guruh bo'lib xatm qilish nazorati — dastlabki sozlash</p>
    </div>
    <div class="bg-stone-900/60 border border-stone-800 rounded-xl p-6 space-y-5">
      <div>
        <label class="block text-sm text-stone-300 mb-2">Ishtirokchilar ismlari</label>
        <div id="memberInputs" class="grid grid-cols-1 gap-2"></div>
        <button id="addMember" class="mt-2 text-xs text-amber-400 hover:text-amber-300">+ yana bittasini qo'shish</button>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-stone-300 mb-2">Jami sahifa (mushaf)</label>
          <input id="totalPages" type="number" value="604" class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div>
          <label class="block text-sm text-stone-300 mb-2">Har bo'lak — necha bet</label>
          <input id="chunkSize" type="number" value="4" class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
      </div>
      <div>
        <label class="block text-sm text-stone-300 mb-2">Ustoz (admin) uchun parol</label>
        <input id="adminPass" type="text" placeholder="masalan: ustoz2026" class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <p id="createError" class="text-rose-400 text-sm hidden"></p>
      <button id="createBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-stone-950 font-semibold rounded-lg py-2.5 transition-colors">Guruhni yaratish</button>
    </div>
  </div>`;

  const memberInputs = document.getElementById("memberInputs");
  function addRow(val=""){
    const inp = document.createElement("input");
    inp.type = "text"; inp.value = val;
    inp.placeholder = `${memberInputs.children.length+1}-ishtirokchi ismi`;
    inp.className = "bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-500";
    memberInputs.appendChild(inp);
  }
  for(let i=0;i<11;i++) addRow();
  document.getElementById("addMember").onclick = () => addRow();

  document.getElementById("createBtn").onclick = async () => {
    const names = Array.from(memberInputs.querySelectorAll("input")).map(i=>i.value.trim()).filter(Boolean);
    const totalPages = Number(document.getElementById("totalPages").value);
    const chunkSize = Number(document.getElementById("chunkSize").value);
    const adminPass = document.getElementById("adminPass").value.trim();
    const errEl = document.getElementById("createError");
    if(names.length < 2){ errEl.textContent = "Kamida 2 ta ishtirokchi ismini kiriting."; errEl.classList.remove("hidden"); return; }
    if(!adminPass){ errEl.textContent = "Ustoz uchun parol kiriting."; errEl.classList.remove("hidden"); return; }
    const chunks = buildSchedule(totalPages, chunkSize, names);
    if(chunks.length === 0){ errEl.textContent = "Sozlamalarni tekshiring."; errEl.classList.remove("hidden"); return; }
    const progress = {};
    chunks.forEach(c => progress[c.id] = { status:"unread", markedBy:null, markedAt:null });
    const newState = { members:names, totalPages, chunkSize, adminPass, progress, createdAt:new Date().toISOString() };

    document.getElementById("createBtn").textContent = "Yaratilmoqda...";
    try{
      const roomId = await createRoom(newState);
      const url = new URL(location.href);
      url.searchParams.set("room", roomId);
      history.replaceState(null, "", url.toString());
      ROOM = roomId; STATE = newState;
      renderShareLink(url.toString());
    }catch(e){
      errEl.textContent = "Xona yaratishda xatolik. Internetni tekshirib qayta urining.";
      errEl.classList.remove("hidden");
      document.getElementById("createBtn").textContent = "Guruhni yaratish";
    }
  };
}

function renderShareLink(url){
  app.innerHTML = `
  <div class="max-w-md mx-auto py-16 text-center">
    <p class="text-amber-400 text-2xl mb-2">۞</p>
    <h2 class="font-serif text-2xl mb-4">Guruh yaratildi!</h2>
    <p class="text-stone-400 text-sm mb-4">Quyidagi havolani Telegram guruhingizga tashlang — hamma shu havola orqali kiradi, hech qanday hisob kerak emas.</p>
    <div class="bg-stone-900 border border-stone-700 rounded-lg p-3 text-sm break-all mb-3">${url}</div>
    <button id="copyBtn" class="bg-amber-500 hover:bg-amber-400 text-stone-950 font-medium rounded-lg px-5 py-2 text-sm">Havolani nusxalash</button>
    <div class="mt-6">
      <button id="goBtn" class="text-stone-400 text-sm underline">Davom etish →</button>
    </div>
  </div>`;
  document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(url);
    document.getElementById("copyBtn").textContent = "Nusxalandi ✓";
  };
  document.getElementById("goBtn").onclick = () => { renderChooseUser(); };
}

/* ====================== EKRAN: XONA TOPILMADI ====================== */
function renderRoomNotFound(){
  app.innerHTML = `
  <div class="max-w-md mx-auto py-16 text-center">
    <p class="text-rose-400 text-2xl mb-2">✕</p>
    <h2 class="font-serif text-xl mb-2">Bunday guruh topilmadi</h2>
    <p class="text-stone-400 text-sm mb-4">Havola noto'g'ri yoki eskirgan bo'lishi mumkin.</p>
    <a href="${location.pathname}" class="text-amber-400 underline text-sm">Yangi guruh yaratish</a>
  </div>`;
}

function renderLoading(){
  app.innerHTML = `<div class="min-h-[60vh] flex items-center justify-center"><p class="font-serif text-lg text-stone-400">Yuklanmoqda…</p></div>`;
}

/* ====================== EKRAN: ISM TANLASH ====================== */
function renderChooseUser(){
  app.dataset.view = "choose";
  app.innerHTML = `
  <div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="max-w-sm w-full bg-stone-900/60 border border-stone-800 rounded-xl p-6 text-center">
      <p class="text-amber-400 text-2xl mb-2">۞</p>
      <h2 class="font-serif text-xl mb-4">Kim sifatida kirasiz?</h2>
      <div id="nameList" class="space-y-2"></div>
    </div>
  </div>`;
  const list = document.getElementById("nameList");
  STATE.members.forEach(name => {
    const btn = document.createElement("button");
    btn.textContent = name;
    btn.className = "w-full bg-stone-800 hover:bg-emerald-800/60 border border-stone-700 rounded-lg py-2 text-sm transition-colors";
    btn.onclick = () => { CURRENT_USER = name; localStorage.setItem("khatm-my-name", name); renderMain(); startPolling(); };
    list.appendChild(btn);
  });
}

/* ====================== ASOSIY EKRAN ====================== */
function renderMain(silent){
  app.dataset.view = "main";
  const chunks = buildSchedule(STATE.totalPages, STATE.chunkSize, STATE.members);
  const totalChunks = chunks.length;
  const readCount = Object.values(STATE.progress).filter(p=>p.status==="read").length;
  const percent = totalChunks ? Math.round((readCount/totalChunks)*100) : 0;
  const memberStats = STATE.members.map((name,i)=>{
    const own = chunks.filter(c=>c.memberIndex===i);
    const done = own.filter(c=>STATE.progress[c.id]?.status==="read").length;
    return { name, total:own.length, done, pct: own.length ? Math.round((done/own.length)*100) : 0 };
  }).sort((a,b)=>b.pct-a.pct);
  const days = [...new Set(chunks.map(c=>c.day))].sort((a,b)=>a-b);
  const log = Object.entries(STATE.progress)
    .filter(([,v])=>v.status==="read" && v.markedAt)
    .map(([id,v])=>({id,...v}))
    .sort((a,b)=>new Date(b.markedAt)-new Date(a.markedAt)).slice(0,15);

  app.innerHTML = `
  <div class="max-w-5xl mx-auto">
    <div class="flex flex-wrap items-start justify-between gap-3 mb-6">
      <div>
        <p class="text-amber-400 text-xl">۞</p>
        <h1 class="font-serif text-2xl sm:text-3xl text-stone-50">Qur'on Xatm</h1>
        <p class="text-stone-400 text-sm">Guruh nazorati — ${STATE.members.length} nafar ishtirokchi</p>
      </div>
      <div class="flex items-center gap-2 text-sm flex-wrap">
        <span class="text-stone-400">Siz:</span>
        <span class="text-amber-300 font-medium">${CURRENT_USER}</span>
        <button id="switchUser" class="text-stone-500 hover:text-stone-300 underline text-xs">almashtirish</button>
        <span id="adminBadge"></span>
      </div>
    </div>
    <div id="adminLoginBox"></div>
    <p id="errBox" class="mb-4 text-rose-400 text-sm ${errorMsg?"":"hidden"}">${errorMsg}</p>
    <p id="noticeBox" class="mb-4 text-amber-300 text-sm ${notice?"":"hidden"}">${notice}</p>

    <div class="bg-stone-900/60 border border-stone-800 rounded-xl p-6 mb-6">
      <div class="flex flex-wrap items-end justify-between gap-4 border-y border-double border-stone-700 py-4">
        <div>
          <p class="font-serif text-5xl text-amber-400">${percent}%</p>
          <p class="text-stone-400 text-sm mt-1">${readCount} / ${totalChunks} bo'lak o'qildi · ${STATE.totalPages} bet, ${STATE.members.length} kishiga bo'lingan</p>
        </div>
        <div class="w-full sm:w-64">
          <div class="h-2.5 bg-stone-800 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 rounded-full" style="width:${percent}%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-stone-900/60 border border-stone-800 rounded-xl p-6 mb-6">
      <h2 class="font-serif text-lg text-stone-100 mb-4">Ishtirokchilar</h2>
      <div class="grid sm:grid-cols-2 gap-3">
        ${memberStats.map((m,i)=>`
          <div class="bg-stone-800/60 border border-stone-700 rounded-lg p-3">
            <div class="flex items-center justify-between text-sm mb-2">
              <span class="${m.name===CURRENT_USER?"text-amber-300 font-medium":"text-stone-200"}">${i===0 && m.pct>0 ? "✦ " : ""}${m.name}</span>
              <span class="text-stone-400">${m.done}/${m.total}</span>
            </div>
            <div class="h-1.5 bg-stone-900 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${m.pct===100?"bg-emerald-500":"bg-emerald-700"}" style="width:${m.pct}%"></div>
            </div>
          </div>`).join("")}
      </div>
    </div>

    <div class="bg-stone-900/60 border border-stone-800 rounded-xl p-6 mb-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 class="font-serif text-lg text-stone-100">Kunlik jadval</h2>
        <p class="text-xs text-stone-500">Yashil — o'qildi · Qizil — o'qilmadi</p>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full border-separate border-spacing-1">
          <thead><tr>
            <th class="text-left text-xs text-stone-500 font-normal px-2 py-1 sticky left-0 bg-stone-900">Kun</th>
            ${STATE.members.map(m=>`<th class="text-xs text-stone-400 font-normal px-2 py-1 whitespace-nowrap">${m}</th>`).join("")}
          </tr></thead>
          <tbody>
            ${days.map(day => `
              <tr>
                <td class="text-xs text-stone-500 px-2 py-1 sticky left-0 bg-stone-900">${day}</td>
                ${STATE.members.map((memberName,mi)=>{
                  const chunk = chunks.find(c=>c.day===day && c.memberIndex===mi);
                  if(!chunk) return "<td></td>";
                  const cell = STATE.progress[chunk.id] || {};
                  const isRead = cell.status === "read";
                  const filledByOther = isRead && cell.markedBy !== memberName;
                  return `<td>
                    <button data-chunk="${chunk.id}" title="${isRead ? (cell.markedBy+" belgiladi · "+fmtDate(cell.markedAt)) : "Bosib o'qilgan deb belgilang"}"
                      class="chunkBtn w-full min-w-[64px] rounded-md px-2 py-1.5 text-xs border transition-colors ${isRead ? "bg-emerald-700/80 border-emerald-500 text-emerald-50 hover:bg-emerald-600" : "bg-rose-950/70 border-rose-800 text-rose-200 hover:bg-rose-900"}">
                      <div class="font-medium">${chunk.start}-${chunk.end}</div>
                      ${filledByOther ? `<div class="text-[10px] opacity-80 truncate">↳ ${cell.markedBy}</div>` : ""}
                    </button>
                  </td>`;
                }).join("")}
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <div class="bg-stone-900/60 border border-stone-800 rounded-xl p-6 mb-6">
      <button id="toggleLog" class="w-full flex items-center justify-between text-left">
        <h2 class="font-serif text-lg text-stone-100">So'nggi harakatlar</h2>
        <span class="text-stone-500 text-sm">ko'rsatish ▼</span>
      </button>
      <div id="logBody" class="mt-4 space-y-2 hidden">
        ${log.length===0 ? `<p class="text-stone-500 text-sm">Hali hech narsa belgilanmagan.</p>` :
          log.map(a=>{
            const c = chunks.find(ch=>ch.id===a.id);
            return `<div class="flex justify-between text-sm border-b border-stone-800 pb-2">
              <span class="text-stone-300"><span class="text-amber-300">${a.markedBy}</span> ${c?`${c.start}-${c.end} betni o'qidi`:""}</span>
              <span class="text-stone-500 text-xs">${fmtDate(a.markedAt)}</span>
            </div>`;
          }).join("")}
      </div>
    </div>

    <div id="adminPanel"></div>
  </div>`;

  // event bindings
  document.getElementById("switchUser").onclick = () => { CURRENT_USER = ""; localStorage.removeItem("khatm-my-name"); renderChooseUser(); };
  document.getElementById("toggleLog").onclick = () => {
    const body = document.getElementById("logBody");
    body.classList.toggle("hidden");
  };
  document.querySelectorAll(".chunkBtn").forEach(btn=>{
    btn.onclick = () => toggleChunk(btn.dataset.chunk);
  });
  renderAdminBadge();
  renderAdminPanel();
}

function renderAdminBadge(){
  const el = document.getElementById("adminBadge");
  if(!el) return;
  if(IS_ADMIN){
    el.innerHTML = `<span class="ml-2 bg-amber-500/20 text-amber-300 border border-amber-600/40 rounded-full px-3 py-1 text-xs">Ustoz sifatida</span>`;
  } else {
    el.innerHTML = `<button id="adminLoginToggle" class="ml-2 text-stone-500 hover:text-amber-400 text-xs border border-stone-700 rounded-full px-3 py-1">Ustoz kirishi</button>`;
    document.getElementById("adminLoginToggle").onclick = () => {
      const box = document.getElementById("adminLoginBox");
      box.innerHTML = `
        <div class="mb-6 bg-stone-900/60 border border-stone-800 rounded-lg p-4 flex flex-wrap gap-2 items-center">
          <input id="adminPassInput" type="password" placeholder="Ustoz paroli" class="bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm flex-1 min-w-[160px]">
          <button id="adminLoginBtn" class="bg-amber-500 hover:bg-amber-400 text-stone-950 rounded-lg px-4 py-2 text-sm font-medium">Kirish</button>
        </div>`;
      document.getElementById("adminLoginBtn").onclick = () => {
        const val = document.getElementById("adminPassInput").value;
        if(val === STATE.adminPass){ IS_ADMIN = true; box.innerHTML=""; renderAdminBadge(); renderAdminPanel(); }
        else { errorMsg = "Parol noto'g'ri."; document.getElementById("errBox").textContent = errorMsg; document.getElementById("errBox").classList.remove("hidden"); }
      };
    };
  }
}

function renderAdminPanel(){
  const el = document.getElementById("adminPanel");
  if(!el) return;
  if(!IS_ADMIN){ el.innerHTML=""; return; }
  el.innerHTML = `
    <div class="bg-amber-950/20 border border-amber-800/40 rounded-xl p-6">
      <h2 class="font-serif text-lg text-amber-300 mb-4">Ustoz paneli</h2>
      <div class="flex flex-wrap gap-3">
        <button id="resetBtn" class="bg-rose-900/60 hover:bg-rose-800 border border-rose-700 text-rose-100 rounded-lg px-4 py-2 text-sm">Barcha belgilarni tozalash</button>
        <button id="exitAdminBtn" class="bg-stone-800 hover:bg-stone-700 border border-stone-700 rounded-lg px-4 py-2 text-sm">Admin rejimidan chiqish</button>
      </div>
    </div>`;
  document.getElementById("resetBtn").onclick = async () => {
    if(!confirm("Barcha belgilar tozalanadi. Rostdan davom etasizmi?")) return;
    Object.keys(STATE.progress).forEach(k=>{ STATE.progress[k] = { status:"unread", markedBy:null, markedAt:null }; });
    await persist();
  };
  document.getElementById("exitAdminBtn").onclick = () => { IS_ADMIN = false; renderMain(); };
}

/* ====================== HARAKATLAR ====================== */
async function toggleChunk(chunkId){
  const cell = STATE.progress[chunkId];
  if(!cell) return;
  if(cell.status === "unread"){
    cell.status = "read"; cell.markedBy = CURRENT_USER; cell.markedAt = new Date().toISOString();
  } else {
    if(cell.markedBy === CURRENT_USER || IS_ADMIN){
      cell.status = "unread"; cell.markedBy = null; cell.markedAt = null;
    } else {
      notice = `Bu bo'lakni ${cell.markedBy} belgilagan. Faqat u yoki ustoz bekor qila oladi.`;
      renderMain();
      setTimeout(()=>{ notice=""; }, 3000);
      return;
    }
  }
  await persist();
}

async function persist(){
  try{
    await writeState(ROOM, STATE);
    errorMsg = "";
  }catch(e){
    errorMsg = "Saqlashda xatolik. Internetni tekshiring.";
  }
  renderMain();
}

/* ====================== ISHGA TUSHIRISH ====================== */
boot();
</script>
</body>
</html>
